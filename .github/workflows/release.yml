name: Release macOS beta

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, and publish draft
    runs-on: macos-26
    environment: release
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require Apple Silicon runner
        run: test "$(uname -m)" = "arm64"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust target and checks
        run: |
          rustup target add aarch64-apple-darwin
          rustup component add clippy rustfmt

      - name: Install native build tools
        run: brew install cmake ninja pkgconf nasm

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release FFmpeg sidecars
        run: pnpm ffmpeg:release

      - name: Validate source and release version
        run: |
          pnpm check
          pnpm release:check -- "$GITHUB_REF_NAME"

      - name: Install Developer ID G2 intermediate certificate
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/DeveloperIDG2CA.cer"
          EXPECTED_SHA256="f16cd3c54c7f83cea4bf1a3e6a0819c8aaa8e4a1528fd144715f350643d2df3a"
          curl --fail --location --silent --show-error \
            https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer \
            --output "$CERTIFICATE_PATH"
          ACTUAL_SHA256="$(shasum -a 256 "$CERTIFICATE_PATH" | awk '{print $1}')"
          test "$ACTUAL_SHA256" = "$EXPECTED_SHA256"
          security import "$CERTIFICATE_PATH" \
            -k "$HOME/Library/Keychains/login.keychain-db"

      - name: Build signed and notarized application
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VIDRA_FFMPEG_MODE: release
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Vidra ${{ github.ref_name }}
          releaseBody: See CHANGELOG.md for the changes in this release. FFmpeg corresponding sources and checksums are attached.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --bundles dmg --target aarch64-apple-darwin

      - name: Verify signature and notarization
        run: |
          DMG_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$DMG_PATH"
          codesign --verify --strict --verbose=2 "$DMG_PATH"

          MOUNT_POINT="$RUNNER_TEMP/vidra-dmg"
          mkdir -p "$MOUNT_POINT"
          detach_dmg() {
            hdiutil detach "$MOUNT_POINT" >/dev/null 2>&1 || true
          }
          trap detach_dmg EXIT
          hdiutil attach "$DMG_PATH" -nobrowse -readonly -mountpoint "$MOUNT_POINT"

          APP_PATH="$(find "$MOUNT_POINT" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"

          detach_dmg
          trap - EXIT

      - name: Create artifact checksums
        run: |
          DMG_PATH="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$DMG_PATH"
          DMG_DIRECTORY="$(dirname "$DMG_PATH")"
          DMG_NAME="$(basename "$DMG_PATH")"
          (cd "$DMG_DIRECTORY" && shasum -a 256 "$DMG_NAME" > "$DMG_NAME.sha256")

      - name: Attach corresponding sources and checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_CHECKSUM="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg.sha256' -print -quit)"
          gh release upload "$GITHUB_REF_NAME" release-assets/ffmpeg-sources/* "$DMG_CHECKSUM" --clobber
